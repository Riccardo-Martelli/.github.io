<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #111; isolation: isolate; height: 200vh; }
  #c {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
  }
  .panel {
    position: relative; margin: 42vh auto 0; width: 60%; padding: 40px;
    color: white; font-family: sans-serif; font-size: 22px; line-height: 1.5;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 18px;
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="panel">
    Hexes behind this panel look soft/blurred: the canvas is fine.<br>
    Hexes stay razor sharp through the panel: the canvas is the cause.
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d', { willReadFrequently: true });
    function size(){ c.width = innerWidth; c.height = innerHeight; }
    size(); addEventListener('resize', size);
    let t = 0;
    function draw(){
      g.clearRect(0, 0, c.width, c.height);
      t += 0.02;
      for (let row = 0; row < 14; row++){
        for (let i = 0; i < 26; i++){
          const cx = (c.width / 24) * i + (row % 2 ? 15 : 0);
          const cy = row * 55 + Math.cos(t + i) * 5;
          g.beginPath();
          for (let k = 0; k < 6; k++){
            const a = Math.PI / 180 * (60 * k - 30);
            const px = cx + 28 * Math.cos(a), py = cy + 28 * Math.sin(a);
            k ? g.lineTo(px, py) : g.moveTo(px, py);
          }
          g.closePath();
          g.strokeStyle = 'hsla(0, 100%, 60%, 0.85)';
          g.lineWidth = 2;
          g.stroke();
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
